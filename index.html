<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☄️!!!Asteroid!!!☄️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --paper: #F6F2E9;
    --paper-raised: #FFFFFF;
    --ink: #24231F;
    --ink-soft: #55534A;
    --pine: #2F5D53;
    --pine-dark: #203F38;
    --amber: #C97A2E;
    --amber-light: #F0DCC0;
    --rust: #A64B3A;
    --line: #DCD5C2;
    --focus-ring: #1D5DE6;

    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Atkinson Hyperlegible", "Segoe UI", Arial, sans-serif;

    --text-scale: 1;
    --radius: 14px;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --paper: #1C1B17;
      --paper-raised: #262420;
      --ink: #F2EFE6;
      --ink-soft: #C9C4B4;
      --pine: #6FA898;
      --pine-dark: #8FC0B0;
      --amber: #E4A25C;
      --amber-light: #4A3A22;
      --rust: #E08A76;
      --line: #3B382F;
    }
  }

  *{ box-sizing: border-box; }

  html{
    font-size: calc(100% * var(--text-scale));
  }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ============================================================
     ACCESSIBILITY UTILITIES
     ============================================================ */
  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  .skip-link{
    position:absolute;
    left:1rem; top:-4rem;
    background: var(--pine);
    color:#fff;
    padding:.75rem 1.25rem;
    border-radius: 0 0 8px 8px;
    text-decoration:none;
    font-weight:700;
    transition: top .15s ease;
    z-index: 100;
  }
  .skip-link:focus{ top:0; }

  :focus-visible{
    outline: 3px solid var(--focus-ring);
    outline-offset: 3px;
    border-radius: 4px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ============================================================
     LAYOUT SHELL
     ============================================================ */
  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 1.75rem 1.25rem 4rem;
  }

  header.top{
    display:flex;
    flex-wrap: wrap;
    align-items:flex-start;
    justify-content: space-between;
    gap: 1rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 1.5rem;
  }

  .story-title{
    font-family: var(--font-display);
    font-weight:700;
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    margin: 0;
    color: var(--pine-dark);
  }

  .story-sub{
    margin: .35rem 0 0;
    color: var(--ink-soft);
    font-size: .95rem;
  }

  /* Text size controls */
  .text-controls{
    display:flex;
    align-items:center;
    gap:.4rem;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: .3rem;
  }
  .text-controls span{
    font-size: .75rem;
    color: var(--ink-soft);
    padding-left: .5rem;
    padding-right: .1rem;
  }
  .text-controls button{
    font-family: var(--font-body);
    background: transparent;
    border: none;
    color: var(--ink);
    width: 2.1rem;
    height: 2.1rem;
    border-radius: 50%;
    cursor:pointer;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .text-controls button:hover{ background: var(--amber-light); }
  .text-controls button[aria-pressed="true"]{
    background: var(--pine);
    color:#fff;
  }

  /* ============================================================
     TRAIL — visual + textual journey map (signature element)
     ============================================================ */
  nav.trail{
    margin-bottom: 1.75rem;
  }
  .trail-label{
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink-soft);
    margin: 0 0 .6rem;
    font-weight:700;
  }
  .trail-track{
    list-style:none;
    display:flex;
    align-items:center;
    gap: 0;
    margin:0; padding:0;
    overflow-x:auto;
    scrollbar-width: thin;
  }
  .trail-track li{
    display:flex;
    align-items:center;
    flex-shrink:0;
  }
  .trail-track li + li::before{
    content:"";
    width: 22px;
    height: 2px;
    background: var(--line);
    flex-shrink:0;
    margin: 0 2px;
  }
  .trail-step{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.3rem;
    background:none;
    border:none;
    cursor:pointer;
    padding: .25rem;
    font-family: var(--font-body);
    color: var(--ink-soft);
    max-width: 88px;
  }
  .trail-step:disabled{ cursor:default; }
  .trail-dot{
    width: 34px; height: 34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--paper-raised);
    border: 2px solid var(--line);
    font-size: 1rem;
  }
  .trail-step[data-current="true"] .trail-dot{
    border-color: var(--amber);
    background: var(--amber-light);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--amber) 20%, transparent);
  }
  .trail-step[data-current="true"]{ color: var(--ink); font-weight:700; }
  .trail-step:not(:disabled):hover .trail-dot{
    border-color: var(--pine);
  }
  .trail-step-label{
    font-size: .68rem;
    text-align:center;
    line-height:1.2;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
    max-width: 84px;
  }

  /* ============================================================
     SCENE CARD
     ============================================================ */
  .scene-card{
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: clamp(1.25rem, 4vw, 2rem);
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  .scene-icon{
    font-size: 2.1rem;
    display:block;
    margin-bottom:.5rem;
    line-height:1;
  }

  .scene-heading{
    font-family: var(--font-display);
    font-weight:600;
    font-size: clamp(1.25rem, 3.2vw, 1.6rem);
    margin: 0 0 .9rem;
    color: var(--ink);
  }

  .scene-text{
    font-size: 1.15rem;
    color: var(--ink);
  }
  .scene-text p{ margin: 0 0 1em; }
  .scene-text p:last-child{ margin-bottom:0; }

  .ending-badge{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    background: var(--rust);
    color:#fff;
    font-weight:700;
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing:.06em;
    padding: .35rem .8rem;
    border-radius: 999px;
    margin-bottom: 1rem;
  }

  /* ============================================================
     CHOICES
     ============================================================ */
  .choices-heading{
    font-family: var(--font-display);
    font-weight:600;
    font-size: 1.05rem;
    margin: 2rem 0 .9rem;
    color: var(--pine-dark);
  }

  .choices{
    list-style:none;
    margin:0; padding:0;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: .9rem;
  }

  .choice-btn{
    width:100%;
    text-align:left;
    display:flex;
    align-items:flex-start;
    gap:.75rem;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    min-height: 44px;
    cursor:pointer;
    font-family: var(--font-body);
    color: var(--ink);
    transition: border-color .12s ease, transform .12s ease, background .12s ease;
  }
  .choice-btn:hover{
    border-color: var(--pine);
    background: color-mix(in srgb, var(--pine) 6%, var(--paper));
  }
  .choice-btn:active{ transform: translateY(1px); }

  .choice-icon{
    font-size: 1.4rem;
    line-height:1;
    flex-shrink:0;
  }
  .choice-label{
    font-weight:700;
    display:block;
    margin-bottom:.15rem;
  }
  .choice-hint{
    display:block;
    font-size: .88rem;
    color: var(--ink-soft);
    font-weight:400;
  }

  /* ============================================================
     FOOTER / RESTART
     ============================================================ */
  .story-footer{
    margin-top: 2rem;
    display:flex;
    justify-content: center;
  }
  .restart-btn{
    background: var(--pine);
    color:#fff;
    border:none;
    border-radius: 999px;
    padding: .8rem 1.6rem;
    font-family: var(--font-body);
    font-weight:700;
    font-size: 1rem;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:.5rem;
  }
  .restart-btn:hover{ background: var(--pine-dark); }

  @media (max-width: 480px){
    header.top{ flex-direction:column; }
    .text-controls{ align-self:flex-start; }
  }
</style>
</head>
<body>

<a href="#scene" class="skip-link">Skip to story</a>

<div class="wrap">

  <header class="top">
    <div>
      <h1 class="story-title" id="story-title">☄️!!!Asteroid!!!☄️</h1>
      <p class="story-sub">A choose-your-path story — read, then pick what happens next.</p>
    </div>

    <div class="text-controls" role="group" aria-label="Text size">
      <span>Text size</span>
      <button type="button" data-size="0.9" aria-pressed="false" aria-label="Small text">A</button>
      <button type="button" data-size="1" aria-pressed="true" aria-label="Medium text">A</button>
      <button type="button" data-size="1.25" aria-pressed="false" aria-label="Large text">A</button>
    </div>
  </header>

  <nav class="trail" aria-label="Your journey so far">
    <p class="trail-label">Your journey</p>
    <ol class="trail-track" id="trailTrack"></ol>
  </nav>

  <main id="scene">
    <div class="scene-card">
      <span class="scene-icon" id="sceneIcon" aria-hidden="true">📖</span>

      <div id="endingBadgeSlot"></div>

      <h2 class="scene-heading" id="sceneHeading" tabindex="-1"></h2>

      <div class="scene-text" id="sceneText" aria-live="polite"></div>

      <div id="choicesSlot"></div>
    </div>

    <div class="story-footer">
      <button type="button" class="restart-btn" id="restartBtn">
        <span aria-hidden="true">↺</span> Start over
      </button>
    </div>
  </main>

</div>

<script>
/* ================================================================
   YOUR STORY GOES HERE
   ----------------------------------------------------------------
   Each entry in STORY.nodes is one "scene" of the story.

   - id:        a short unique name for the scene (used internally)
   - icon:      a single emoji shown above the scene (optional)
   - heading:   short scene title shown to students
   - text:      an array of strings — each string becomes one
                paragraph. Write as many as you like.
   - choices:   an array of 2–3 options, each with:
                  label - the short choice text on the button
                  hint  - (optional) a short second line of detail
                  icon  - (optional) emoji shown on the button
                  next  - the id of the scene this choice leads to
   - ending:    set to true on final scenes (omit choices, or
                leave choices out entirely — the Restart button
                will show automatically)

   Replace the sample story below with your own. Keep the same
   shape (id, icon, heading, text, choices/ending) for each scene.
   ================================================================ */

const STORY = {
  start: "gate",
  nodes: {

    gate: {
      icon: "🏛️",
      heading: "A Strange Morning",
      text: [
        "You wake-up one morning to find that your house is empty. You go to check your phone but find that there is no signal.",
        "It seems odd. Outside, you can hear what sounds like hundreds of birds singing and shrieking."
      ],
      choices: [
        { icon: "🚪", label: "Look outside the window", 
        { icon: "📞", label: "Turn on the TV", 
      ]
    },

    call: {
      icon: "☎️",
      heading: "No Answer",
      text: [
        "The office phone rings out. No one picks up.",
        "You glance back at the doors. The light inside flickers, just once — like a page catching a breeze that shouldn't be there."
      ],
      choices: [
        { icon: "🚪", label: "Go in anyway", hint: "Curiosity wins.", next: "hall" },
        { icon: "🏠", label: "Head home and tell someone tomorrow", hint: "The safe choice.", next: "ending_safe" }
      ]
    },

    hall: {
      icon: "📚",
      heading: "The Reading Hall",
      text: [
        "Inside, every lamp in the reading hall is on, but there's no one at the desks. A single book lies open in the middle of the long table, its pages fluttering with no wind at all.",
        "On the cover, in your own handwriting, are the words: 'Finish the story.'"
      ],
      choices: [
        { icon: "📖", label: "Read the open book", hint: "See what it says.", next: "book" },
        { icon: "🔎", label: "Look for whoever left it there", hint: "Search the hall first.", next: "search" }
      ]
    },

    search: {
      icon: "🕯️",
      heading: "Between the Shelves",
      text: [
        "You walk the aisles. Nothing moves. But every third shelf, you notice, is missing exactly one book — always the same title, over and over.",
        "You go back to the table. The open book is still waiting."
      ],
      choices: [
        { icon: "📖", label: "Read the open book", hint: "You're out of other ideas.", next: "book" }
      ]
    },

    book: {
      icon: "✒️",
      heading: "Finish the Story",
      text: [
        "The last page is blank except for a single sentence: 'The reader who finishes this book gets to write its ending.'",
        "You pick up the pen resting in the spine."
      ],
      choices: [
        { icon: "🖋️", label: "Write a happy ending", hint: "Let the story rest.", next: "ending_happy" },
        { icon: "🌙", label: "Write one more chapter instead", hint: "You're not ready for it to end.", next: "ending_open" }
      ]
    },

    ending_safe: {
      icon: "🌇",
      heading: "Another Day",
      ending: true,
      text: [
        "You never find out what was on that table. Some evenings, walking past the library, you swear you can still see a light on that shouldn't be.",
        "THE END — you can restart to try a different path."
      ]
    },

    ending_happy: {
      icon: "🏆",
      heading: "The Last Page",
      ending: true,
      text: [
        "You write three simple lines, close the book, and the lamps dim to their ordinary evening glow.",
        "In the morning, the librarian finds the book back on its shelf — closed, finished, and perfectly ordinary.",
        "THE END — you can restart to try a different path."
      ]
    },

    ending_open: {
      icon: "🌙",
      heading: "To Be Continued",
      ending: true,
      text: [
        "You write one more chapter, and the pen doesn't stop when you lift it. It keeps writing on its own, sentences spilling out faster than you can read them.",
        "The library light is still on, every night, waiting for the next reader to pick up where you left off.",
        "THE END — you can restart to try a different path."
      ]
    }

  }
};

/* ================================================================
   STORY ENGINE — no need to edit anything below this line
   ================================================================ */

const state = {
  currentId: STORY.start,
  visited: [] // { id, heading, icon }
};

const el = {
  icon: document.getElementById("sceneIcon"),
  heading: document.getElementById("sceneHeading"),
  text: document.getElementById("sceneText"),
  choicesSlot: document.getElementById("choicesSlot"),
  endingSlot: document.getElementById("endingBadgeSlot"),
  trailTrack: document.getElementById("trailTrack"),
  restartBtn: document.getElementById("restartBtn")
};

function renderTrail(){
  el.trailTrack.innerHTML = "";
  state.visited.forEach((step, index) => {
    const li = document.createElement("li");
    const isCurrent = index === state.visited.length - 1;

    const btn = document.createElement("button");
    btn.className = "trail-step";
    btn.type = "button";
    btn.dataset.current = isCurrent ? "true" : "false";
    btn.disabled = isCurrent;
    btn.setAttribute("aria-label",
      isCurrent
        ? `Current scene: ${step.heading}`
        : `Go back to: ${step.heading}`
    );

    const dot = document.createElement("span");
    dot.className = "trail-dot";
    dot.setAttribute("aria-hidden", "true");
    dot.textContent = step.icon || "•";

    const label = document.createElement("span");
    label.className = "trail-step-label";
    label.textContent = step.heading;

    btn.appendChild(dot);
    btn.appendChild(label);

    if (!isCurrent){
      btn.addEventListener("click", () => goToStep(index));
    }

    li.appendChild(btn);
    el.trailTrack.appendChild(li);
  });
}

function goToStep(index){
  state.visited = state.visited.slice(0, index + 1);
  state.currentId = state.visited[index].id;
  render(false);
}

function render(scrollFocus = true){
  const node = STORY.nodes[state.currentId];
  if (!node){
    console.error("Missing story node:", state.currentId);
    return;
  }

  el.icon.textContent = node.icon || "📖";
  el.heading.textContent = node.heading || "";

  el.text.innerHTML = "";
  (node.text || []).forEach(paragraph => {
    const p = document.createElement("p");
    p.textContent = paragraph;
    el.text.appendChild(p);
  });

  el.endingSlot.innerHTML = "";
  el.choicesSlot.innerHTML = "";

  const isEnding = node.ending || !node.choices || node.choices.length === 0;

  if (isEnding){
    const badge = document.createElement("p");
    badge.className = "ending-badge";
    badge.innerHTML = `<span aria-hidden="true">🏁</span> The End`;
    el.endingSlot.appendChild(badge);
  } else {
    const heading = document.createElement("h3");
    heading.className = "choices-heading";
    heading.textContent = "What do you do?";
    el.choicesSlot.appendChild(heading);

    const list = document.createElement("ul");
    list.className = "choices";

    node.choices.forEach(choice => {
      const li = document.createElement("li");
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "choice-btn";
      btn.addEventListener("click", () => choose(choice.next));

      btn.innerHTML = `
        <span class="choice-icon" aria-hidden="true">${choice.icon || "➡️"}</span>
        <span>
          <span class="choice-label">${choice.label}</span>
          ${choice.hint ? `<span class="choice-hint">${choice.hint}</span>` : ""}
        </span>
      `;
      li.appendChild(btn);
      list.appendChild(li);
    });

    el.choicesSlot.appendChild(list);
  }

  renderTrail();

  if (scrollFocus){
    el.heading.focus();
    el.heading.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function choose(nextId){
  state.currentId = nextId;
  const node = STORY.nodes[nextId];
  state.visited.push({ id: nextId, heading: node.heading, icon: node.icon });
  render(true);
}

function restart(){
  state.currentId = STORY.start;
  const startNode = STORY.nodes[STORY.start];
  state.visited = [{ id: STORY.start, heading: startNode.heading, icon: startNode.icon }];
  render(true);
}

el.restartBtn.addEventListener("click", restart);

/* Text size controls */
document.querySelectorAll(".text-controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.documentElement.style.setProperty("--text-scale", btn.dataset.size);
    document.querySelectorAll(".text-controls button").forEach(b =>
      b.setAttribute("aria-pressed", b === btn ? "true" : "false")
    );
  });
});

/* Init */
restart();
</script>

</body>
</html>
